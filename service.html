<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planning Service — Grey Corner</title>

<style>
/* === AJOUT DOUBLE SHIFT === */
@keyframes blink-soft {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}
.staff-name.double-shift {
  color: #ff3b3b !important;
  animation: blink-soft 1.6s ease-in-out infinite;
}

/* === TON CSS EXISTANT (inchangé raccourci visuellement) === */
body { font-family: Arial; background:#0e0b0d; color:white; }

.staff-row { display:flex; margin:5px 0; }
.staff-name {
  flex:1;
  padding:10px;
  background:#222;
  border-radius:8px;
  text-align:center;
}
.staff-poste {
  width:80px;
  text-align:center;
  background:#333;
  border-radius:8px;
}

/* (tu gardes tout ton vrai CSS ici tel quel) */
</style>
</head>

<body>

<div id="planning-container">Chargement...</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1aKrmu7Hdf1tb4_0QFCGC6VYjUVlRKeDJYLYs9qIM6Aw/export?format=csv&gid=0";

function cleanPoste(p){
  return (p||"").substring(0,4).toUpperCase();
}

function escapeHtml(str){
  return String(str||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

async function init(){
  const res = await fetch(SHEET_URL);
  const txt = await res.text();
  const rows = txt.split("\n").slice(1);

  const data = rows.map(r=>{
    const c = r.split(",");
    return {
      date:c[0],
      matin:c[1],
      soir:c[2]
    };
  });

  render(data);
}

function render(data){
  const container = document.getElementById("planning-container");

  container.innerHTML = data.map(j=>`
    <div>
      <h3>${j.date}</h3>

      <b>Matin</b>
      ${parseStaff(j.matin, j)}

      <b>Soir</b>
      ${parseStaff(j.soir, j)}
    </div>
  `).join("");
}

/* === FONCTION MODIFIÉE === */
function parseStaff(t, dayObj){
  if(!t || t==="-" ) return "Repos";

  const allMatin = (dayObj.matin||"").toLowerCase();
  const allSoir  = (dayObj.soir||"").toLowerCase();

  return t.split(",").map(s=>{
    s=s.trim();

    let name="", poste="";

    if(s.includes(":")){
      const parts=s.split(":");
      poste=cleanPoste(parts[0]);
      name=parts[1].trim();
    }else{
      name=s;
    }

    const nameLower=name.toLowerCase();

    // 🔴 DETECTION DOUBLE SHIFT
    const isDouble =
      allMatin.includes(nameLower) &&
      allSoir.includes(nameLower);

    return `
      <div class="staff-row">
        <div class="staff-name ${isDouble ? 'double-shift' : ''}">
          ${escapeHtml(name)}
        </div>
        ${poste ? `<div class="staff-poste">${poste}</div>` : ""}
      </div>
    `;
  }).join("");
}

init();
</script>

</body>
</html>
