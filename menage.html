<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Ménage — Ordre & Vestiaires</title>
  <link rel="icon" type="image/jpeg" href="LOGO.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
  
  <style>
    /* Spécificités pour les boutons d'onglets de semaine (look tactique de match) */
    .tabs-wrapper {
      display: flex;
      background: var(--panel);
      padding: 4px;
      border-radius: 16px;
      border: 1px solid var(--stroke);
      max-width: 400px;
      margin: 0 auto 24px;
      position: relative;
      z-index: 2;
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      padding: 11px;
      border-radius: 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.22s ease;
    }
    .tab-btn.active {
      background: linear-gradient(180deg, var(--red), #8a0f12);
      color: #fff;
      box-shadow: 0 4px 12px rgba(193, 39, 45, 0.3);
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    /* Spécificités pour menage layout */
    .shift-row-menage {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .shift-row-menage:last-child {
      border-bottom: none;
    }
    .shift-info-box {
      flex: 1;
    }
    .shift-label-menage {
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .shift-label-menage.matin {
      color: var(--gold);
    }
    .shift-label-menage.soir {
      color: var(--red-dim);
    }
    .staff-name-menage {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
      margin-top: 2px;
      text-transform: uppercase;
    }
    
    .scroll-mt-24 {
      scroll-margin-top: 6rem;
    }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="glow-a"></div>
  <div class="glow-b"></div>

  <header class="fade-up" style="animation-delay:.0s">
    <div class="logo-wrap">
      <img src="LOGO.jpg" alt="Grey Corner" onerror="this.src='https://ui-avatars.com/api/?name=GC&background=111317&color=c8784a&size=256'">
    </div>
    <div class="eyebrow">Tactiques Lions de l'Atlas 🇲🇦</div>
    <div class="page-title">Planning <span>Ménage</span></div>
    <div class="page-sub">Ordre, Propreté & Vestiaires 🏆 ⚽</div>
    <div class="gold-rule"></div>
    <a href="index.html" class="back-btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
      Retour Menu
    </a>
  </header>

  <div class="container">
    <div class="tabs-wrapper fade-up" style="animation-delay:.07s">
      <button class="tab-btn active" onclick="switchWeek('S1')">Semaine 01</button>
      <button class="tab-btn" onclick="switchWeek('S2')">Semaine 02</button>
    </div>

    <main class="fade-up" style="animation-delay:.12s" id="planning-list">
      <!-- Rempli par JavaScript -->
    </main>
  </div>

  <footer class="page-footer">
    Grey Corner · Lions de l'Atlas 🇲🇦 ⚽
  </footer>

  <script>
    const PLANNING_DATA = {
        S1: {
            title: 'Semaine 01',
            schedules: [
                { day: 'lundi', matin: { staff: 'SAMIRA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'mardi', matin: { staff: 'SAOUAD M' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'mercredi', matin: { staff: 'ANISSA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'jeudi', matin: { staff: 'HAKIMA' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'vendredi', matin: { staff: 'SAMIRA / ANISSA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'samedi', matin: { staff: 'SOUAD M / HAKIMA' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'dimanche', matin: { staff: 'SAMIRA / ANISSA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
            ]
        },
        S2: {
            title: 'Semaine 02',
            schedules: [
                { day: 'lundi', matin: { staff: 'SOUAD M' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'mardi', matin: { staff: 'SAMIRA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'mercredi', matin: { staff: 'HAKIMA' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'jeudi', matin: { staff: 'ANISSA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'vendredi', matin: { staff: 'SOUAD M / HAKIMA' }, soir: { staff: 'SAMIRA / ANISSA' } },
                { day: 'samedi', matin: { staff: 'SAMIRA / ANISSA' }, soir: { staff: 'SOUAD M / HAKIMA' } },
                { day: 'dimanche', matin: { staff: 'SOUAD M / HAKIMA' }, soir: { staff: 'SAMIRA / ANISSA' } },
            ]
        }
    };

    const ACCENTS = [
      "var(--red)",
      "var(--green)",
      "var(--gold)",
      "var(--red-dim)",
      "var(--green-dim)",
      "var(--gold-dim)",
      "rgba(193, 39, 45, 0.7)"
    ];

    let currentWeek = 'S1';

    function getTodayLabel() {
      return new Intl.DateTimeFormat('fr-FR', { weekday: 'long' }).format(new Date()).toLowerCase().trim();
    }

    function switchWeek(weekKey) {
      currentWeek = weekKey;
      
      // Update buttons active class
      const btns = document.querySelectorAll('.tab-btn');
      btns[0].classList.toggle('active', weekKey === 'S1');
      btns[1].classList.toggle('active', weekKey === 'S2');
      
      renderPlanning();
    }

    function renderPlanning() {
      const listContainer = document.getElementById('planning-list');
      const today = getTodayLabel();
      const schedules = PLANNING_DATA[currentWeek].schedules;

      listContainer.innerHTML = schedules.map((row, idx) => {
        const isToday = row.day === today;
        const isWE = ['vendredi', 'samedi', 'dimanche'].includes(row.day);
        const accent = ACCENTS[idx % ACCENTS.length];

        return `
          <div class="day-card ${isToday ? 'is-today' : ''} scroll-mt-24" id="day-${row.day}" style="--accent:${accent}">
            <div class="card-header">
              <span class="day-name" style="text-transform: capitalize;">${row.day}</span>
              ${isToday ? `<div class="today-badge"><span class="today-dot"></span>Aujourd'hui</div>` : ''}
            </div>
            <div class="card-body" style="padding: 0;">
              
              <div class="shift-row-menage">
                <div class="icon-box" style="font-size: 16px; width: 34px; height: 34px; border-radius: 10px;">☀️</div>
                <div class="shift-info-box">
                  <div class="shift-label-menage matin">Service Matin • ${isWE ? '06:30 - 14:00' : '06:30 - 12:00'}</div>
                  <div class="staff-name-menage">${row.matin.staff}</div>
                </div>
              </div>

              <div class="shift-row-menage">
                <div class="icon-box" style="font-size: 16px; width: 34px; height: 34px; border-radius: 10px; background: var(--green-soft); border-color: rgba(0, 98, 51, 0.2);">🌙</div>
                <div class="shift-info-box">
                  <div class="shift-label-menage soir" style="color: var(--green);">Service Soir • ${isWE ? '14:00 - Fin' : '12:00 - Fin'}</div>
                  <div class="staff-name-menage">${row.soir.staff}</div>
                </div>
              </div>

            </div>
          </div>
        `;
      }).join('');

      // Auto-scroll to today's card if found
      setTimeout(() => {
        const todayCard = document.getElementById(`day-${today}`);
        if (todayCard) {
          todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 150);
    }

    // Init call
    renderPlanning();
  </script>
</body>
</html>
