<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grey Corner • Private Access</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0b0d;
      --bg2:#111317;
      --panel:rgba(17,19,23,.78);
      --panel-strong:rgba(22,25,30,.92);
      --stroke:rgba(255,255,255,.09);
      --text:#f5f7fa;
      --muted:rgba(245,247,250,.62);
      --gold:#d6b36a;
      --gold-soft:rgba(214,179,106,.14);
      --shadow:0 20px 60px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, rgba(214,179,106,.08), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,255,255,.035), transparent 24%),
        linear-gradient(160deg, #090a0d 0%, #0f1115 45%, #090a0d 100%);
      color:var(--text);
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }

    body{
      display:flex;
      justify-content:center;
      position:relative;
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.035;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.8) 0px,
          rgba(255,255,255,.8) 1px,
          transparent 1px,
          transparent 2px
        );
      mix-blend-mode:soft-light;
      z-index:0;
    }

    .glow-top{
      position:fixed;
      width:420px;
      height:420px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(214,179,106,.12), transparent 65%);
      filter:blur(22px);
      pointer-events:none;
      z-index:0;
      top:-120px;
      right:-120px;
    }

    .shell{
      width:100%;
      max-width:470px;
      padding:26px 18px 36px;
      position:relative;
      z-index:2;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border:1px solid var(--stroke);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        rgba(10,12,15,.74);
      border-radius:30px;
      padding:26px 22px 22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top right, rgba(214,179,106,.12), transparent 28%),
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.02) 45%, transparent 100%);
      pointer-events:none;
    }

    .logo-wrap{
      position:relative;
      width:94px;
      height:94px;
      margin:0 auto 18px;
      border-radius:999px;
      padding:4px;
      background:linear-gradient(135deg, rgba(214,179,106,.9), rgba(255,255,255,.45), rgba(214,179,106,.6));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 18px 30px rgba(0,0,0,.35),
        0 0 28px rgba(214,179,106,.12);
    }

    .logo-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:999px;
      display:block;
      background:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      color:var(--gold);
      font-size:11px;
      font-weight:800;
      letter-spacing:.34em;
      text-transform:uppercase;
    }

    .eyebrow::before,
    .eyebrow::after{
      content:"";
      width:22px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(214,179,106,.7), transparent);
    }

    .brand{
      font-family:'Cormorant Garamond',serif;
      font-size:42px;
      line-height:1;
      font-weight:700;
      letter-spacing:.06em;
      text-align:center;
      margin:0;
      color:#f8f5ef;
    }

    .sub{
      margin:10px auto 0;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      max-width:290px;
    }

    .divider{
      width:92px;
      height:1px;
      margin:18px auto 0;
      background:linear-gradient(90deg, transparent, rgba(214,179,106,.9), transparent);
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:22px 4px 14px;
      color:rgba(255,255,255,.78);
      font-size:12px;
      font-weight:700;
      letter-spacing:.20em;
      text-transform:uppercase;
    }

    .section-title span:last-child{
      color:rgba(214,179,106,.8);
      letter-spacing:.14em;
      font-size:11px;
    }

    .nav-list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .lux-card{
      position:relative;
      display:block;
      overflow:hidden;
      min-height:118px;
      border-radius:26px;
      text-decoration:none;
      border:1px solid var(--stroke);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        var(--panel);
      backdrop-filter:blur(14px);
      box-shadow:0 12px 30px rgba(0,0,0,.24);
      transition:transform .35s ease, border-color .35s ease, box-shadow .35s ease, background .35s ease;
    }

    .lux-card:hover{
      transform:translateY(-5px);
      border-color:rgba(214,179,106,.38);
      box-shadow:0 22px 40px rgba(0,0,0,.33), 0 0 0 1px rgba(214,179,106,.08) inset;
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)),
        var(--panel-strong);
    }

    .card-image{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      opacity:.17;
      transform:scale(1);
      transition:transform .7s ease, opacity .35s ease;
      filter:grayscale(20%) contrast(108%);
    }

    .lux-card:hover .card-image{
      transform:scale(1.06);
      opacity:.24;
    }

    .card-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(8,10,13,.92) 0%, rgba(8,10,13,.78) 44%, rgba(8,10,13,.52) 100%),
        linear-gradient(180deg, transparent, rgba(214,179,106,.03));
    }

    .card-inner{
      position:relative;
      z-index:2;
      min-height:118px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:18px 18px 18px 20px;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .tag{
      font-size:10px;
      font-weight:800;
      letter-spacing:.28em;
      color:var(--gold);
      text-transform:uppercase;
    }

    .title-row{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .emoji{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(214,179,106,.08);
      border:1px solid rgba(214,179,106,.16);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
      font-size:20px;
      flex:0 0 auto;
    }

    .title{
      margin:0;
      font-size:21px;
      font-weight:800;
      color:#fff;
      letter-spacing:-.02em;
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    .go{
      width:44px;
      height:44px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(214,179,106,.22);
      color:var(--gold);
      background:rgba(214,179,106,.06);
      transition:all .3s ease;
      flex:0 0 auto;
    }

    .lux-card:hover .go{
      transform:translateX(2px);
      background:rgba(214,179,106,.16);
      border-color:rgba(214,179,106,.44);
      box-shadow:0 0 20px rgba(214,179,106,.12);
    }

    .footer{
      text-align:center;
      padding-top:18px;
      color:rgba(255,255,255,.34);
      font-size:11px;
      letter-spacing:.28em;
      text-transform:uppercase;
    }

    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(16px); }
      to{ opacity:1; transform:translateY(0); }
    }

    .fade-up{
      opacity:0;
      animation:fadeUp .65s ease forwards;
    }

    /* PIN LOCKSCREEN */
    .lockscreen{
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        linear-gradient(180deg, rgba(6,7,10,.78), rgba(6,7,10,.88)),
        radial-gradient(circle at top, rgba(214,179,106,.08), transparent 30%);
      backdrop-filter:blur(14px);
    }

    .pin-panel{
      width:min(100%, 390px);
      border-radius:32px;
      border:1px solid rgba(214,179,106,.16);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01)),
        rgba(12,14,18,.92);
      box-shadow:
        0 28px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.04);
      padding:24px 20px 22px;
      position:relative;
      overflow:hidden;
    }

    .pin-panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top right, rgba(214,179,106,.10), transparent 28%),
        linear-gradient(140deg, transparent 0%, rgba(255,255,255,.02) 45%, transparent 100%);
      pointer-events:none;
    }

    .pin-top{
      position:relative;
      z-index:1;
      text-align:center;
      margin-bottom:18px;
    }

    .pin-badge{
      width:68px;
      height:68px;
      margin:0 auto 14px;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      color:var(--gold);
      background:rgba(214,179,106,.08);
      border:1px solid rgba(214,179,106,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    }

    .pin-title{
      margin:0;
      font-family:'Cormorant Garamond',serif;
      font-size:38px;
      line-height:1;
      color:#f8f5ef;
      letter-spacing:.03em;
    }

    .pin-sub{
      margin:8px auto 0;
      max-width:260px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .pin-dots{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:center;
      gap:12px;
      margin:18px 0 12px;
    }

    .pin-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(214,179,106,.35);
      background:rgba(255,255,255,.04);
      box-shadow:inset 0 1px 2px rgba(0,0,0,.25);
      transition:all .22s ease;
    }

    .pin-dot.filled{
      background:linear-gradient(180deg, rgba(214,179,106,.95), rgba(182,144,76,.95));
      border-color:rgba(214,179,106,.9);
      box-shadow:0 0 14px rgba(214,179,106,.22);
    }

    .pin-error{
      min-height:20px;
      text-align:center;
      font-size:12px;
      color:#d89a9a;
      margin-bottom:12px;
      letter-spacing:.02em;
      position:relative;
      z-index:1;
    }

    .pin-pad{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:12px;
      margin-top:6px;
    }

    .pin-key{
      height:68px;
      border:none;
      border-radius:22px;
      color:#f8f5ef;
      font-size:24px;
      font-weight:700;
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015)),
        rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .12s ease, border-color .22s ease, background .22s ease, box-shadow .22s ease;
    }

    .pin-key:active{
      transform:scale(.97);
    }

    .pin-key:hover{
      border-color:rgba(214,179,106,.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.02)),
        rgba(214,179,106,.03);
    }

    .pin-key.func{
      font-size:13px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:700;
    }

    .pin-key.enter{
      color:var(--gold);
    }

    .hidden-app{
      visibility:hidden;
    }

    @media (max-width:420px){
      .pin-panel{ padding:22px 16px 18px; border-radius:28px; }
      .pin-key{ height:64px; border-radius:20px; }
      .pin-title{ font-size:34px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-top"></div>

  <div id="lockscreen" class="lockscreen">
    <div class="pin-panel">
      <div class="pin-top">
        <div class="pin-badge">✦</div>
        <h2 class="pin-title">Accès privé</h2>
        <p class="pin-sub">Saisissez votre code PIN pour ouvrir l’espace planning Grey Corner.</p>
      </div>

      <div class="pin-dots" id="pinDots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>

      <div class="pin-error" id="pinError"></div>

      <div class="pin-pad">
        <button class="pin-key" data-num="1">1</button>
        <button class="pin-key" data-num="2">2</button>
        <button class="pin-key" data-num="3">3</button>
        <button class="pin-key" data-num="4">4</button>
        <button class="pin-key" data-num="5">5</button>
        <button class="pin-key" data-num="6">6</button>
        <button class="pin-key" data-num="7">7</button>
        <button class="pin-key" data-num="8">8</button>
        <button class="pin-key" data-num="9">9</button>
        <button class="pin-key func" id="clearPin">Effacer</button>
        <button class="pin-key" data-num="0">0</button>
        <button class="pin-key func enter" id="submitPin">Entrer</button>
      </div>
    </div>
  </div>

  <div id="root" class="shell hidden-app"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const PIN_CODE = "2026";
    let pinValue = "";

    const lockscreen = document.getElementById("lockscreen");
    const rootShell = document.getElementById("root");
    const dots = Array.from(document.querySelectorAll(".pin-dot"));
    const pinError = document.getElementById("pinError");

    function updateDots() {
      dots.forEach((dot, i) => {
        dot.classList.toggle("filled", i < pinValue.length);
      });
    }

    function clearError() {
      pinError.textContent = "";
    }

    function showError(msg) {
      pinError.textContent = msg;
    }

    function unlockApp() {
      lockscreen.style.opacity = "0";
      lockscreen.style.pointerEvents = "none";
      setTimeout(() => {
        lockscreen.remove();
        rootShell.classList.remove("hidden-app");
      }, 250);
    }

    function submitPin() {
      if (pinValue.length !== 4) {
        showError("Entrez un code PIN à 4 chiffres.");
        return;
      }

      if (pinValue === PIN_CODE) {
        clearError();
        unlockApp();
      } else {
        showError("Code incorrect.");
        pinValue = "";
        updateDots();
      }
    }

    document.querySelectorAll("[data-num]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (pinValue.length >= 4) return;
        pinValue += btn.dataset.num;
        clearError();
        updateDots();
        if (pinValue.length === 4) {
          setTimeout(submitPin, 120);
        }
      });
    });

    document.getElementById("clearPin").addEventListener("click", () => {
      pinValue = "";
      clearError();
      updateDots();
    });

    document.getElementById("submitPin").addEventListener("click", submitPin);

    const React = window.React;
    const ReactDOM = window.ReactDOM;

    const NAV_LINKS = [
      {
        title: "Planning Bar",
        subtitle: "Boissons & Coordination",
        desc: "Organisation élégante du service bar pendant Ramadan.",
        href: "bar.html",
        img: "https://images.unsplash.com/photo-1544145945-f904253d0c71?w=1200",
        icon: "🥤"
      },
      {
        title: "Planning Service",
        subtitle: "Salle & Hospitalité",
        desc: "Répartition fluide du service et de l’accueil client.",
        href: "service.html",
        img: "https://images.pexels.com/photos/1556691/pexels-photo-1556691.jpeg?auto=compress&cs=tinysrgb&w=1200",
        icon: "🍽️"
      },
      {
        title: "Planning Cuisine",
        subtitle: "Production & Préparation",
        desc: "Suivi raffiné de l’équipe cuisine et du rythme opérationnel.",
        href: "Cuisine.html",
        img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=1200",
        icon: "👨‍🍳"
      },
      {
        title: "Planning Ménage",
        subtitle: "Ordre & Entretien",
        desc: "Gestion claire des tâches de propreté et d’entretien.",
        href: "menage.html",
        img: "https://images.pexels.com/photos/4099467/pexels-photo-4099467.jpeg?auto=compress&cs=tinysrgb&w=1200",
        icon: "✨"
      }
    ];

    const Arrow = () =>
      React.createElement(
        'svg',
        { className:'w-4 h-4', fill:'none', stroke:'currentColor', viewBox:'0 0 24 24' },
        React.createElement('path', {
          strokeLinecap:'round',
          strokeLinejoin:'round',
          strokeWidth:'2.4',
          d:'M9 5l7 7-7 7'
        })
      );

    const App = () => {
      return React.createElement('div', null,
        React.createElement('section', { className:'hero fade-up', style:{ animationDelay:'0s' } },
          React.createElement('div', { className:'text-center relative z-10' },
            React.createElement('div', { className:'logo-wrap' },
              React.createElement('img', {
                src:'LOGO.jpg',
                alt:'Grey Corner',
                onError:(e)=>{ e.target.src='https://ui-avatars.com/api/?name=GC&background=111317&color=d6b36a&size=256'; }
              })
            ),
            React.createElement('div', { className:'eyebrow' }, 'Private Planning Access'),
            React.createElement('h1', { className:'brand' }, 'Grey Corner'),
            React.createElement('p', { className:'sub' },
              'Interface privée au style premium pour consulter les plannings par service.'
            ),
            React.createElement('div', { className:'divider' })
          )
        ),

        React.createElement('div', { className:'section-title fade-up', style:{ animationDelay:'.08s' } },
          React.createElement('span', null, 'Navigation'),
          React.createElement('span', null, 'Secure View')
        ),

        React.createElement('nav', { className:'nav-list' },
          NAV_LINKS.map((link, i) =>
            React.createElement('a', {
              key:i,
              href:link.href,
              className:'lux-card fade-up',
              style:{ animationDelay:`${0.12 + i * 0.08}s` }
            },
              React.createElement('div', {
                className:'card-image',
                style:{ backgroundImage:`url(${link.img})` }
              }),
              React.createElement('div', { className:'card-overlay' }),
              React.createElement('div', { className:'card-inner' },
                React.createElement('div', { className:'meta' },
                  React.createElement('div', { className:'tag' }, link.subtitle),
                  React.createElement('div', { className:'title-row' },
                    React.createElement('div', { className:'emoji' }, link.icon),
                    React.createElement('div', null,
                      React.createElement('h2', { className:'title' }, link.title),
                      React.createElement('div', { className:'hint' }, link.desc)
                    )
                  )
                ),
                React.createElement('div', { className:'go' }, React.createElement(Arrow))
              )
            )
          )
        ),

        React.createElement('div', { className:'footer fade-up', style:{ animationDelay:'.5s' } },
          'Grey Corner • Confidential Access'
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
